<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Bebas+Neue&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --primary: #4f46e5;
            --secondary: #9333ea;
            --accent: #06b6d4;
            --text-main: #0f172a;
            --text-muted: #475569;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --highlight-bg: #fef08a;
            --code-bg: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 1.5rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-title {
            font-size: 2.8rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 2rem;
            font-family: 'Bebas Neue';
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
            font-size: 0.8rem;
        }

        .btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .try-btn {
            padding: 6px 14px;
            font-size: 0.85rem;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin-top: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .try-btn:hover {
            background: var(--secondary);
            transform: scale(1.05);
        }

        pre {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'JetBrains Mono';
            font-size: 0.85rem;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            color: #1e293b;
        }

        .top-nav {
            display: flex;
            gap: 5px;
            margin-bottom: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .scroll-pane::-webkit-scrollbar {
            width: 8px;
        }

        .scroll-pane::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            border: 1px solid var(--border);
            padding: 12px;
            text-align: left;
        }

        th {
            background: #f1f5f9;
            font-weight: 800;
            color: var(--primary);
        }

        .quiz-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .quiz-opt {
            width: 100%;
            text-align: left;
            padding: 20px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
        }

        .quiz-opt:nth-child(1) {
            background: #ef4444;
        }

        /* Red */
        .quiz-opt:nth-child(2) {
            background: #3b82f6;
        }

        /* Blue */
        .quiz-opt:nth-child(3) {
            background: #f59e0b;
        }

        /* Yellow */
        .quiz-opt:nth-child(4) {
            background: #10b981;
        }

        /* Green */
        .quiz-opt:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2);
            opacity: 0.9;
        }

        .quiz-opt:active {
            transform: translateY(2px);
            box-shadow: none;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="top-nav">
            <a href="00_Index.html" class="btn">🏠 Home</a>
            <a href="01_PreSession.html" class="btn">🔭 01</a>
            <a href="02_Concept_Loops.html" class="btn">📖 02</a>
            <a href="03_Activity.html" class="btn">⚡ 03</a>
            <a href="04_FillBlanks.html" class="btn">✏️ 04</a>
            <a href="05_Exploration.html" class="btn">🔍 05</a>
            <a href="06_LeetCode.html" class="btn">🧩 06</a>
            <a href="08_ClassQuiz.html" class="btn">🏆 08</a>
            <a href="13_Revision_Recall.html" class="btn">🧠 13</a>
            <a href="14_Code_Listing.html" class="btn">📄 14</a>
        </div>

        <h1 class="header-title">🏆 Day 2: Kahoot Sprint!</h1>
        <div style="max-width:800px; margin:0 auto;">
            <div id="quiz-area">
                <div class="card" id="q-card">
                    <h2 id="q-text" style="text-align:center; margin-bottom:1.5rem;">Ready?</h2>
                    <div class="quiz-container" id="opt-container">
                        <button class="quiz-opt" onclick="startSprint()">START SPRINT!</button>
                    </div>
                </div>
                <div id="score-board"
                    style="text-align:center; font-size:1.5rem; font-weight:bold; color:var(--primary); display:none;">
                    Score: <span id="score">0</span> / <span id="total">0</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        const questions = [
            { q: "Result of 13 % 5?", a: ["2", "3", "5", "0"], ans: "3" },
            { q: "Which loop runs AT LEAST once?", a: ["for", "while", "do-while", "if"], ans: "do-while" },
            { q: "Complexity of Prime check up to √n?", a: ["O(n)", "O(√n)", "O(n²)", "O(log n)"], ans: "O(√n)" },
            { q: "1234 % 10 gives?", a: ["1", "123", "4", "10"], ans: "4" },
            { q: "FizzBuzz check for 15 should first be?", a: ["%3", "%5", "%15", "%10"], ans: "%15" }
        ];
        let currentQ = 0;
        let score = 0;

        function startSprint() {
            document.getElementById('score-board').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            if (currentQ >= questions.length) {
                document.getElementById('q-text').innerText = "🏆 SPRINT FINISHED!";
                document.getElementById('opt-container').innerHTML = `<button class="quiz-opt" style="grid-column: span 2; background:var(--primary)" onclick="location.reload()">REPLAY</button>`;
                return;
            }
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = `Q${currentQ + 1}: ${q.q}`;
            document.getElementById('total').innerText = questions.length;

            let html = '';
            q.a.forEach(opt => {
                html += `<button class="quiz-opt" onclick="checkAnswer('${opt}')">${opt}</button>`;
            });
            document.getElementById('opt-container').innerHTML = html;
        }

        function checkAnswer(userAns) {
            const correct = questions[currentQ].ans;
            if (userAns === correct) {
                score++;
                document.getElementById('score').innerText = score;
                const btns = document.querySelectorAll('.quiz-opt');
                btns.forEach(b => { if (b.innerText === correct) b.style.background = '#059669'; });
            } else {
                const btns = document.querySelectorAll('.quiz-opt');
                btns.forEach(b => {
                    if (b.innerText === correct) b.style.background = '#059669';
                    if (b.innerText === userAns) b.style.background = '#b91c1c';
                });
            }
            currentQ++;
            setTimeout(showQuestion, 1200);
        }
    </script>
</body>

</html>
